<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小熊軟糖飄散中</title>
    <style>
      /* CSS: 讓場景全螢幕，移出身體間距，隱藏捲軸 */
      body {
        margin: 0;
        overflow: hidden;
        /* 換成類似藍天白雲的漸層背景 */
        background: linear-gradient(
          135deg,
          #a7d8f5 0%,
          #e0f2fe 50%,
          #ffffff 100%
        );
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      let scene, camera, renderer;
      let models = []; // 儲存所有複製的模型實例

      // 兩個模型分別要複製的數量
      const numGummy1 = 10;
      const numGummy2 = 10;

      init();
      animate();

      function init() {
        // 1. 初始化場景
        scene = new THREE.Scene();

        // 2. 初始化相機 (透視相機)
        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.z = 25; // 相機後退，看得到更多模型

        // 3. 初始化渲染器
        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // 開啟抗鋸齒和透明
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio); // 適應高解析度螢幕
        document.body.appendChild(renderer.domElement);

        // 4. 加入燈光 (重要：模型需要多個燈光才能顯現立體感和顏色)
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0); // 環境光，基礎亮度
        scene.add(ambientLight);

        const directionalLight1 = new THREE.DirectionalLight(0xffffff, 2.0); // 主方向光
        directionalLight1.position.set(1, 1, 1).normalize();
        scene.add(directionalLight1);

        const directionalLight2 = new THREE.DirectionalLight(0xffffff, 1.5); // 輔助方向光
        directionalLight2.position.set(-1, -1, 1).normalize();
        scene.add(directionalLight2);

        // 5. 載入模型
        const loader = new GLTFLoader();

        // 載入第一個模型 Gummy1.glb
        loadModelInstances(loader, "Gummy1.glb", numGummy1);

        // 載入第二個模型 Gummy2.glb
        loadModelInstances(loader, "Gummy2.glb", numGummy2);

        // 6. 處理視窗大小調整
        window.addEventListener("resize", onWindowResize, false);
      }

      // 載入模型並建立多個克隆實例的函數
      function loadModelInstances(loader, modelPath, numberOfInstances) {
        loader.load(
          modelPath,
          function (gltf) {
            const originalModel = gltf.scene;

            // 為每個複製的模型設定隨機屬性
            for (let i = 0; i < numberOfInstances; i++) {
              const modelInstance = originalModel.clone(); // 複製模型
              setupModel(modelInstance);
              models.push(modelInstance);
              scene.add(modelInstance);
            }
          },
          undefined,
          function (error) {
            console.error(`模型 ${modelPath} 載入失敗：`, error);
          },
        );
      }

      // 初始化每個模型的特定屬性
      function setupModel(model) {
        // 1. 隨機縮放 (0.7 到 1.8 倍，讓大小更顯眼)
        const scale = 0.7 + Math.random() * 1.1;
        model.scale.set(scale, scale, scale);

        // 2. 隨機起始位置 (全螢幕範圍內)
        // 根據相機距離調整了邊界，讓模型分散得更開
        model.position.x = (Math.random() - 0.5) * 60; // X 軸
        model.position.y = (Math.random() - 0.5) * 50; // Y 軸
        model.position.z = (Math.random() - 0.5) * 30; // Z 軸（景深）

        // 3. 隨機旋轉
        model.rotation.x = Math.random() * Math.PI * 2;
        model.rotation.y = Math.random() * Math.PI * 2;
        model.rotation.z = Math.random() * Math.PI * 2;

        // 4. 設定運動速度屬性 (自定義屬性)
        // 飄散速度稍微加快一點，感覺更靈動
        model.userData.speedX = (Math.random() - 0.5) * 0.08;
        model.userData.speedY = (Math.random() - 0.5) * 0.08;
        model.userData.rotSpeedX = (Math.random() - 0.5) * 0.03; // X 軸旋轉速度
        model.userData.rotSpeedY = (Math.random() - 0.5) * 0.03; // Y 軸旋轉速度
      }

      // 動畫迴圈
      function animate() {
        requestAnimationFrame(animate);

        // 更新每個模型的狀態
        models.forEach((model) => {
          // 1. 移動位置
          model.position.x += model.userData.speedX;
          model.position.y += model.userData.speedY;

          // 2. 自轉
          model.rotation.x += model.userData.rotSpeedX;
          model.rotation.y += model.userData.rotSpeedY;

          // 3. 邊界檢查 (飄出螢幕後從另一邊回來)
          // 根據新的相機位置和範圍調整了邊界數值
          const boundX = 35; // X 軸邊界
          const boundY = 30; // Y 軸邊界

          if (model.position.x > boundX) model.position.x = -boundX;
          if (model.position.x < -boundX) model.position.x = boundX;
          if (model.position.y > boundY) model.position.y = -boundY;
          if (model.position.y < -boundY) model.position.y = boundY;
        });

        // 渲染場景
        renderer.render(scene, camera);
      }

      // 視窗調整函數
      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>
