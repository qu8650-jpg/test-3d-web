<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小熊軟糖 - 終極除蟲版</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          #87ceeb 0%,
          #e0f2fe 70%,
          #ffffff 100%
        );
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
          "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import * as CANNON from "cannon-es";

      let scene, camera, renderer, world;
      let gummies = [];

      init();
      animate();

      function init() {
        // 物理世界：設定為無重力太空中繼
        world = new CANNON.World();
        world.gravity.set(0, 0, 0);

        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.z = 10;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sunLight = new THREE.DirectionalLight(0xffffff, 3);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        // 建立六面隱形牆壁盒子
        createBoxBoundaries();

        const loader = new GLTFLoader();
        loadWithPhysics(loader, "Gummy1.glb", 10);
        loadWithPhysics(loader, "Gummy2.glb", 10);

        window.addEventListener("resize", onWindowResize);
      }

      function createBoxBoundaries() {
        const wallMaterial = new CANNON.Material();
        const contactMat = new CANNON.ContactMaterial(
          wallMaterial,
          wallMaterial,
          {
            restitution: 1.0,
            friction: 0.0,
          },
        );
        world.addContactMaterial(contactMat);

        const walls = [
          { pos: [0, -10, 0], rot: [-Math.PI / 2, 0, 0] },
          { pos: [0, 10, 0], rot: [Math.PI / 2, 0, 0] },
          { pos: [-15, 0, 0], rot: [0, Math.PI / 2, 0] },
          { pos: [15, 0, 0], rot: [0, -Math.PI / 2, 0] },
          { pos: [0, 0, -10], rot: [0, 0, 0] },
          { pos: [0, 0, 10], rot: [0, Math.PI, 0] },
        ];

        walls.forEach((w) => {
          const body = new CANNON.Body({ mass: 0, material: wallMaterial });
          body.addShape(new CANNON.Plane());
          body.position.set(...w.pos);
          body.quaternion.setFromEuler(...w.rot);
          world.addBody(body);
        });
      }

      function loadWithPhysics(loader, path, count) {
        loader.load(path, (gltf) => {
          const master = gltf.scene;

          // --- 修正 1：座標放逐法加強版 ---
          master.visible = false;
          master.position.set(9999, 9999, 9999);
          scene.add(master); // 即使加進去也看不見且在遠方

          for (let i = 0; i < count; i++) {
            const mesh = master.clone();
            mesh.visible = true;
            // 克隆體在 setupModel 時會被賦予獨立座標，所以不會跟著母體跑去遠方
            const s = 1.2 + Math.random() * 0.8;
            mesh.scale.set(s, s, s);
            scene.add(mesh);

            const body = new CANNON.Body({
              mass: 1,
              shape: new CANNON.Sphere(s * 0.8),
              // ❌ 不要設定初始位置在 (0,0,0)
              position: new CANNON.Vec3(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 15,
                (Math.random() - 0.5) * 5,
              ),
              velocity: new CANNON.Vec3(
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10,
                (Math.random() - 0.5) * 10,
              ),
              angularVelocity: new CANNON.Vec3(
                Math.random() * 2,
                Math.random() * 2,
                Math.random() * 2,
              ),
            });

            body.linearDamping = 0.0;
            body.angularDamping = 0.01;

            world.addBody(body);
            gummies.push({ mesh, body });
          }
        });
      }

      function animate() {
        requestAnimationFrame(animate);

        // --- 修正 2：暴力殺蟲法 (核心修正) ---
        // 遍歷場景中的所有物件，殺掉所有在 (0,0,0) 且名字包含 gummy 的物件
        scene.children.forEach((child) => {
          if (
            child.isMesh &&
            Math.abs(child.position.x) < 0.1 &&
            Math.abs(child.position.y) < 0.1 &&
            Math.abs(child.position.z) < 0.1
          ) {
            // ❌ 如果有物件極度接近 (0,0,0)，且看起來像小熊，就強制移除
            scene.remove(child);
            // 如果是物理身體，也要移除 (雖然這裡主要是 mesh 問題)
          }
        });

        world.fixedStep();

        gummies.forEach((obj) => {
          const speed = obj.body.velocity.length();
          if (speed < 3.0) {
            obj.body.velocity.x += (Math.random() - 0.5) * 0.5;
            obj.body.velocity.y += (Math.random() - 0.5) * 0.5;
          }

          obj.mesh.position.copy(obj.body.position);
          obj.mesh.quaternion.copy(obj.body.quaternion);
        });

        renderer.render(scene, camera);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>
