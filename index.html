<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小熊軟糖大冒險 - 最終修正版</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        /* 調整背景漸層，讓藍天感更強 */
        background: linear-gradient(
          135deg,
          #87ceeb 0%,
          #e0f2fe 70%,
          #ffffff 100%
        );
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      let scene, camera, renderer;
      let models = [];
      const numGummy1 = 12;
      const numGummy2 = 12;

      init();
      animate();

      function init() {
        scene = new THREE.Scene();

        // --- 調整 1：相機更靠近 (從 25 -> 8) ---
        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.z = 8;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // 優化清晰度
        document.body.appendChild(renderer.domElement);

        // 增強燈光，讓近看的小熊更有光澤
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 3);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        const loader = new GLTFLoader();

        // 載入兩個模型
        loadModelInstances(loader, "Gummy1.glb", numGummy1);
        loadModelInstances(loader, "Gummy2.glb", numGummy2);

        window.addEventListener("resize", onWindowResize, false);
      }

      function loadModelInstances(loader, modelPath, numberOfInstances) {
        loader.load(modelPath, function (gltf) {
          // 重要：我們「不」把 gltf.scene 加入場景
          // 這樣中央就不會出現靜止的原始模型
          const masterModel = gltf.scene;

          for (let i = 0; i < numberOfInstances; i++) {
            const instance = masterModel.clone();
            setupModel(instance);
            models.push(instance);
            scene.add(instance);
          }
        });
      }

      function setupModel(model) {
        // --- 調整 2：模型縮放變大 (從 1.2 -> 2.5 起跳) ---
        const scale = 2.0 + Math.random() * 1.5;
        model.scale.set(scale, scale, scale);

        // 初始位置隨機分佈 (配合近距離相機)
        model.position.x = (Math.random() - 0.5) * 30;
        model.position.y = (Math.random() - 0.5) * 20;
        model.position.z = (Math.random() - 0.5) * 10;

        // 隨機旋轉
        model.rotation.set(
          Math.random() * Math.PI,
          Math.random() * Math.PI,
          Math.random() * Math.PI,
        );

        // 賦予隨機速度
        model.userData.speedX = (Math.random() - 0.5) * 0.03;
        model.userData.speedY = (Math.random() - 0.5) * 0.03;
        model.userData.rotSpeedX = (Math.random() - 0.5) * 0.015;
        model.userData.rotSpeedY = (Math.random() - 0.5) * 0.015;
      }

      function animate() {
        requestAnimationFrame(animate);

        models.forEach((model) => {
          model.position.x += model.userData.speedX;
          model.position.y += model.userData.speedY;
          model.rotation.x += model.userData.rotSpeedX;
          model.rotation.y += model.userData.rotSpeedY;

          // --- 調整 3：邊界檢查 (讓小熊在視野內循環) ---
          const boundX = 16;
          const boundY = 12;

          if (model.position.x > boundX) model.position.x = -boundX;
          if (model.position.x < -boundX) model.position.x = boundX;
          if (model.position.y > boundY) model.position.y = -boundY;
          if (model.position.y < -boundY) model.position.y = boundY;
        });

        renderer.render(scene, camera);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>
