<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>小熊軟糖 - 終極放逐版</title>
    <style>
      body {
        margin: 0;
        overflow: hidden;
        background: linear-gradient(
          135deg,
          #87ceeb 0%,
          #e0f2fe 70%,
          #ffffff 100%
        );
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>

    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

      let scene, camera, renderer;
      let models = [];

      init();
      animate();

      function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(
          75,
          window.innerWidth / window.innerHeight,
          0.1,
          1000,
        );
        camera.position.z = 8;

        renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.5));
        const sunLight = new THREE.DirectionalLight(0xffffff, 3);
        sunLight.position.set(5, 10, 7);
        scene.add(sunLight);

        const loader = new GLTFLoader();

        // 處理第一個模型
        loader.load("Gummy1.glb", (gltf) => {
          const master = gltf.scene;
          // --- 核心修正：座標放逐 ---
          master.position.set(9999, 9999, 9999);
          master.visible = false;
          scene.add(master);

          for (let i = 0; i < 12; i++) {
            const clone = master.clone();
            clone.visible = true;
            setupModel(clone);
            models.push(clone);
            scene.add(clone);
          }
        });

        // 處理第二個模型
        loader.load("Gummy2.glb", (gltf) => {
          const master = gltf.scene;
          // --- 核心修正：座標放逐 ---
          master.position.set(9999, 9999, 9999);
          master.visible = false;
          scene.add(master);

          for (let i = 0; i < 12; i++) {
            const clone = master.clone();
            clone.visible = true;
            setupModel(clone);
            models.push(clone);
            scene.add(clone);
          }
        });

        window.addEventListener("resize", onWindowResize);
      }

      function setupModel(model) {
        const scale = 2.0 + Math.random() * 1.5;
        model.scale.set(scale, scale, scale);
        // 隨機初始位置，避免重疊在中心
        model.position.set(
          (Math.random() - 0.5) * 30,
          (Math.random() - 0.5) * 20,
          (Math.random() - 0.5) * 10,
        );
        model.rotation.set(
          Math.random() * Math.PI,
          Math.random() * Math.PI,
          Math.random() * Math.PI,
        );
        model.userData = {
          speedX: (Math.random() - 0.5) * 0.03,
          speedY: (Math.random() - 0.5) * 0.03,
          rotX: (Math.random() - 0.5) * 0.015,
          rotY: (Math.random() - 0.5) * 0.015,
        };
      }

      function animate() {
        requestAnimationFrame(animate);
        models.forEach((m) => {
          m.position.x += m.userData.speedX;
          m.position.y += m.userData.speedY;
          m.rotation.x += m.userData.rotX;
          m.rotation.y += m.userData.rotY;

          if (m.position.x > 18) m.position.x = -18;
          if (m.position.x < -18) m.position.x = 18;
          if (m.position.y > 14) m.position.y = -14;
          if (m.position.y < -14) m.position.y = 14;
        });
        renderer.render(scene, camera);
      }

      function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
      }
    </script>
  </body>
</html>
